kind = "web"
previewPath = "/"
title = "مدرسة نصر الدين"
version = "1.0.0"
id = "artifacts/lms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22419

[services.development]
run = "pnpm --filter @workspace/lms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lms", "run", "build" ]
publicDir = "artifacts/lms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22419"
BASE_PATH = "/"
